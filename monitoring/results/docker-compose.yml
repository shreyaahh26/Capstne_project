```yaml
version: "3.9"

services:
  scheduler:
    build: ./scheduler
    container_name: central-scheduler
    ports:
      - "9000:9000"
    depends_on:
      - worker1
      - worker2
      - worker3
    networks:
      - distributed-net

  worker1:
    build: ./worker
    container_name: worker-node-1
    ports:
      - "8001:8001"
    environment:
      - NODE_ID=worker-1
      - CAPACITY=100
    networks:
      - distributed-net

  worker2:
    build: ./worker
    container_name: worker-node-2
    ports:
      - "8002:8002"
    environment:
      - NODE_ID=worker-2
      - CAPACITY=80
    networks:
      - distributed-net

  worker3:
    build: ./worker
    container_name: worker-node-3
    ports:
      - "8003:8003"
    environment:
      - NODE_ID=worker-3
      - CAPACITY=60
    networks:
      - distributed-net

networks:
  distributed-net:
    driver: bridge
```
